version: '3.8'

services:
  cabinet:
    image: ghcr.io/floatas/cabinet:latest
    container_name: cabinet
    restart: unless-stopped
    ports:
      - 3002:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /volume1/Konteineris/Docker/cabinet/data:/data
    environment:
      - KB_PASSWORD=
      - DOMAIN=192.168.0.162
      - CABINET_DATA_DIR=/data
      # Container reaches host daemon via Docker bridge gateway
      - CABINET_DAEMON_URL=http://host.docker.internal:3005
      # Browser connects to daemon directly on LAN
      - CABINET_PUBLIC_DAEMON_ORIGIN=ws://192.168.0.162:3005
      - TZ=Europe/Vilnius
